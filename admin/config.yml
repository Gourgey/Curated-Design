backend:
  name: github
  repo: Gourgey/Curated-Design
  branch: main

local_backend: true

media_folder: "assets/images/uploads"
public_folder: "/assets/images/uploads"

collections:
  - name: "settings"
    label: "Site Settings"
    files:
      - name: "settings"
        label: "Global Settings"
        file: "src/content/settings.json"
        format: "json"
        fields:
          - { label: "Studio Name", name: "studioName", widget: "string" }
          - { label: "Email", name: "email", widget: "string" }
          - { label: "Location", name: "location", widget: "string" }
          - { label: "Primary CTA Text", name: "primaryCtaText", widget: "string" }
          - { label: "Primary CTA URL", name: "primaryCtaUrl", widget: "string" }
          - { label: "Footer CTA Heading", name: "ctaHeading", widget: "string" }
          - { label: "Footer CTA Text", name: "ctaText", widget: "text" }

  - name: "pages"
    label: "Pages"
    files:
      - name: "home"
        label: "Homepage"
        file: "src/content/pages/home.json"
        format: "json"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - label: "Hero"
            name: "hero"
            widget: "object"
            collapsed: false
            fields:
              - { label: "Headline", name: "headline", widget: "string" }
              - { label: "Subhead", name: "subhead", widget: "text" }
          - label: "Carousel"
            name: "carousel"
            widget: "object"
            collapsed: false
            hint: "These images are owned by the Homepage only. They do not change any Project or Service entry."
            fields:
              - label: "Slides"
                name: "slides"
                widget: "list"
                summary: "{{fields.alt}}"
                fields:
                  - { label: "Image", name: "image", widget: "image" }
                  - { label: "Alt Text", name: "alt", widget: "string" }
          - label: "Homepage Services Section"
            name: "servicesSection"
            widget: "object"
            collapsed: false
            hint: "This section selects Service entries. Images, titles, summaries, and links are owned by each Service entry."
            fields:
              - { label: "Kicker", name: "kicker", widget: "string" }
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Lead", name: "lead", widget: "text" }
              - label: "Featured Services"
                name: "featuredServices"
                widget: "list"
                summary: "{{fields.service}}"
                hint: "Add, remove, or reorder homepage service cards here. To change an image or card title, edit the selected Service entry."
                fields:
                  - label: "Service"
                    name: "service"
                    widget: "relation"
                    collection: "services"
                    value_field: "slug"
                    search_fields: ["title", "slug", "summary"]
                    display_fields: ["title", "slug", "cardImage"]
                    filters:
                      - field: "status"
                        values: ["published", "coming_soon"]
          - label: "Homepage Collections Section"
            name: "collectionsSection"
            widget: "object"
            collapsed: false
            hint: "This section selects Project entries. Images, titles, kickers, and links are owned by each Project entry."
            fields:
              - { label: "Kicker", name: "kicker", widget: "string" }
              - { label: "Heading", name: "heading", widget: "string" }
              - label: "Featured Projects"
                name: "featuredProjects"
                widget: "list"
                summary: "{{fields.project}}"
                hint: "Add, remove, or reorder homepage project cards here. Cards link to /projects/{slug}.html. To change an image or card title, edit the selected Project entry."
                fields:
                  - label: "Project"
                    name: "project"
                    widget: "relation"
                    collection: "projects"
                    value_field: "slug"
                    search_fields: ["title", "slug", "category", "kicker"]
                    display_fields: ["title", "slug", "cardImage"]
                    filters:
                      - field: "status"
                        values: ["published", "coming_soon"]
                  - label: "Homepage Card Width"
                    name: "cardSpan"
                    widget: "select"
                    required: false
                    options:
                      - { label: "Auto", value: "" }
                      - { label: "Half width", value: "span-6" }
                      - { label: "Third width", value: "span-4" }
                    hint: "Use Auto for adaptive grids, or choose a width to preserve a specific visual rhythm."
          - label: "Design Philosophy"
            name: "philosophy"
            widget: "object"
            collapsed: false
            fields:
              - { label: "Kicker", name: "kicker", widget: "string" }
              - { label: "Image", name: "image", widget: "image" }
              - { label: "Image Alt", name: "imageAlt", widget: "string", required: false }
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Paragraphs", name: "paragraphs", widget: "list", field: { label: "Paragraph", name: "paragraph", widget: "text" } }
          - label: "CTA"
            name: "cta"
            widget: "object"
            fields:
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Text", name: "text", widget: "text" }
              - { label: "Button Label", name: "buttonLabel", widget: "string" }
      - name: "about"
        label: "About Page"
        file: "src/content/pages/about.json"
        format: "json"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Intro Heading", name: "introHeading", widget: "string" }
          - { label: "Intro Text", name: "introText", widget: "text" }
          - { label: "Work Heading", name: "workHeading", widget: "string" }
          - { label: "Work Paragraphs", name: "workParagraphs", widget: "list", field: { label: "Paragraph", name: "paragraph", widget: "text" } }
          - { label: "Focus Heading", name: "focusHeading", widget: "string" }
          - { label: "Focus Areas", name: "focusAreas", widget: "list", field: { label: "Area", name: "area", widget: "string" } }
          - label: "Process Steps"
            name: "processSteps"
            widget: "list"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Text", name: "text", widget: "text" }
          - { label: "Locations Heading", name: "locationsHeading", widget: "string" }
          - { label: "Locations Text", name: "locationsText", widget: "text" }
      - name: "contact"
        label: "Contact Page"
        file: "src/content/pages/contact.json"
        format: "json"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Heading", name: "heading", widget: "string" }
          - { label: "Lead", name: "lead", widget: "text" }
          - { label: "Studio Details Heading", name: "detailsHeading", widget: "string" }
          - { label: "Note", name: "note", widget: "text" }
      - name: "projectsPage"
        label: "Projects Page"
        file: "src/content/pages/projects.json"
        format: "json"
        fields:
          - { label: "Hero Headline", name: "heroHeadline", widget: "string" }
          - { label: "Hero Subhead", name: "heroSubhead", widget: "text" }
          - label: "Categories"
            name: "categories"
            widget: "list"
            fields:
              - { label: "ID", name: "id", widget: "string" }
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Note", name: "note", widget: "text" }

  - name: "services"
    label: "Services"
    folder: "src/content/services"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    identifier_field: "title"
    fields:
      - { label: "Tags", name: "tags", widget: "hidden", default: "service" }
      - { label: "Permalink", name: "permalink", widget: "hidden", default: false }
      - { label: "Title", name: "title", widget: "string", hint: "Used for service cards and the service detail page title." }
      - { label: "Slug", name: "slug", widget: "string", hint: "Controls the URL: /curated_services/slug.html" }
      - { label: "Status", name: "status", widget: "select", options: [{ label: "Published", value: "published" }, { label: "Coming Soon", value: "coming_soon" }, { label: "Draft", value: "draft" }], default: "published", hint: "Draft entries are hidden from the public site." }
      - { label: "Order", name: "order", widget: "number", value_type: "int", hint: "Fallback ordering outside homepage curation." }
      - { label: "Summary", name: "summary", widget: "text", hint: "Shown on service cards wherever this Service is featured." }
      - { label: "Card Image", name: "cardImage", widget: "image", hint: "Used by homepage service cards. Changing it updates every card for this Service." }
      - { label: "Card Alt", name: "cardAlt", widget: "string", hint: "Alt text for service card images." }
      - { label: "Cover Image", name: "coverImage", widget: "image", hint: "Used as the service detail page hero image." }
      - { label: "Cover Alt", name: "coverAlt", widget: "string" }
      - { label: "Intro", name: "intro", widget: "text", hint: "Lead copy on the service detail page." }
      - label: "At a Glance"
        name: "glance"
        widget: "list"
        fields:
          - { label: "Label", name: "label", widget: "string" }
          - { label: "Text", name: "text", widget: "string" }
      - label: "Content Sections"
        name: "sections"
        widget: "list"
        fields:
          - { label: "Heading", name: "heading", widget: "string" }
          - { label: "List Type", name: "listType", widget: "select", options: ["ul", "ol"], default: "ul" }
          - { label: "Items", name: "items", widget: "list", field: { label: "Item", name: "item", widget: "string" } }
          - { label: "Note", name: "note", widget: "text", required: false }
      - { label: "Enquiry Heading", name: "enquiryHeading", widget: "string" }
      - { label: "Enquiry Text", name: "enquiryText", widget: "text" }
      - { label: "CTA Heading", name: "ctaHeading", widget: "string" }
      - { label: "CTA Text", name: "ctaText", widget: "text" }

  - name: "projects"
    label: "Projects"
    folder: "src/content/projects"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    identifier_field: "title"
    fields:
      - { label: "Tags", name: "tags", widget: "hidden", default: "project" }
      - { label: "Permalink", name: "permalink", widget: "hidden", default: false }
      - { label: "Title", name: "title", widget: "string", hint: "Used for project cards and the project detail page title." }
      - { label: "Slug", name: "slug", widget: "string", hint: "Controls the URL: /projects/slug.html" }
      - { label: "Status", name: "status", widget: "select", options: [{ label: "Published", value: "published" }, { label: "Coming Soon", value: "coming_soon" }, { label: "Draft", value: "draft" }], default: "published", hint: "Draft entries are hidden from listings, homepage selections, and detail-page generation." }
      - { label: "Order", name: "order", widget: "number", value_type: "int", hint: "Controls ordering on the Projects listing." }
      - { label: "Category", name: "category", widget: "select", options: ["Residential", "Hospitality", "Commercial"] }
      - { label: "Kicker", name: "kicker", widget: "string" }
      - { label: "Summary / Subtitle", name: "subtitle", widget: "text", hint: "Short project summary used near the project title on the detail page and in CMS previews." }
      - { label: "Status Label", name: "statusLabel", widget: "string", required: false, hint: "Optional visible badge on the project detail page, such as Coming soon." }
      - { label: "Show in Projects Listing", name: "showInProjects", widget: "boolean", default: true, hint: "Controls the Projects page only. Homepage featuring is controlled in the Homepage entry." }
      - { label: "Listing Grid Class", name: "gridClass", widget: "string", default: "col-span-4 lg:col-span-4 md:col-span-3 sm:col-span-2" }
      - { label: "Card Image", name: "cardImage", widget: "image", hint: "Used by project cards on the homepage and Projects listing. Changing it updates every card for this Project." }
      - { label: "Card Alt", name: "cardAlt", widget: "string", hint: "Alt text for project card images." }
      - { label: "Hero Image", name: "heroImage", widget: "image", hint: "Used as the project detail page hero image." }
      - { label: "Hero Alt", name: "heroAlt", widget: "string" }
      - { label: "Tags", name: "projectTags", widget: "list", field: { label: "Tag", name: "tag", widget: "string" } }
      - { label: "Article Heading", name: "articleHeading", widget: "string", default: "Overview" }
      - { label: "Lead", name: "lead", widget: "text", hint: "Opening paragraph for the project detail page." }
      - { label: "Body", name: "body", widget: "markdown", required: false }
      - label: "Callout"
        name: "callout"
        widget: "object"
        required: false
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Text", name: "text", widget: "text" }
      - label: "Extra Sections"
        name: "extraSections"
        widget: "list"
        required: false
        fields:
          - { label: "Heading", name: "heading", widget: "string" }
          - { label: "Text", name: "text", widget: "markdown", required: false }
      - label: "Facts"
        name: "facts"
        widget: "list"
        fields:
          - { label: "Label", name: "label", widget: "string" }
          - { label: "Value", name: "value", widget: "string" }
      - { label: "Aside Text", name: "asideText", widget: "text" }
      - label: "Gallery"
        name: "gallery"
        widget: "object"
        required: false
        fields:
          - { label: "Heading", name: "heading", widget: "string", required: false }
          - { label: "Text", name: "text", widget: "text", required: false }
          - label: "Images"
            name: "images"
            widget: "list"
            required: false
            fields:
              - { label: "Image", name: "image", widget: "image" }
              - { label: "Alt", name: "alt", widget: "string" }
      - { label: "CTA Heading", name: "ctaHeading", widget: "string" }
      - { label: "CTA Text", name: "ctaText", widget: "text" }
